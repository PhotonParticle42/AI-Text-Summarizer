<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>AI Text Summarizer</h1>

        <label for="summaryMode">Summary Style</label>
        <select id="summaryMode">
            <option value="short">Short</option>
            <option value="bullet">Bullet Points</option>
            <option value="paragraph">One Paragraph</option>
        </select>

        <label for="inputText">Input Text</label>
        <textarea id="inputText" placeholder="Paste your text here..." oninput="updateTextStats()"></textarea>

        <div class="stats">
            <span id="charCount">Characters: 0</span>
            <span id="wordCount">Words: 0</span>
        </div>

        <div class="button-row">
            <button id="summarizeBtn" onclick="summarizeText()">Summarize</button>
            <button id="clearBtn" onclick="clearAll()" type="button">Clear</button>
            <button id="copyBtn" onclick="copySummary()" type="button">Copy Summary</button>
        </div>

        <h2>Summary</h2>
        <div id="output">Your summary will appear here.</div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
