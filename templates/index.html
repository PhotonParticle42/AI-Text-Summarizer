<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>AI Text Summarizer</h1>

        <textarea id="inputText" placeholder="Paste your text here..."></textarea>

        <button id="summarizeBtn" onclick="summarizeText()">Summarize</button>

        <h2>Summary</h2>
        <div id="output">Your summary will appear here.</div>
    </div>

    <script>
        async function summarizeText() {
            const text = document.getElementById("inputText").value.trim();
            const output = document.getElementById("output");
            const button = document.getElementById("summarizeBtn");

            if (!text) {
                output.innerText = "Please enter some text first.";
                return;
            }

            button.disabled = true;
            button.innerText = "Summarizing...";
            output.innerText = "Generating summary...";

            try {
                const response = await fetch("/summarize", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (!response.ok) {
                    output.innerText = data.error || "Something went wrong.";
                    return;
                }

                output.innerText = data.summary;
            } catch (error) {
                output.innerText = "Network error. Please try again.";
            } finally {
                button.disabled = false;
                button.innerText = "Summarize";
            }
        }
    </script>
</body>
</html>
